# Run with: gh label create -R maqalaqil/mhost <name> -c <color> -d <description>
# Or use: https://github.com/EndBug/label-sync

# Type
- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: enhancement
  color: "a2eeef"
  description: New feature or improvement

- name: question
  color: "d876e3"
  description: Help or clarification needed

- name: documentation
  color: "0075ca"
  description: Documentation improvements

- name: performance
  color: "fbca04"
  description: Performance improvement

- name: security
  color: "e11d48"
  description: Security related

# Priority
- name: "priority: critical"
  color: "b60205"
  description: Must fix immediately

- name: "priority: high"
  color: "d93f0b"
  description: Fix in next release

- name: "priority: medium"
  color: "fbca04"
  description: Fix when possible

- name: "priority: low"
  color: "0e8a16"
  description: Nice to have

# Status
- name: triage
  color: "ededed"
  description: Needs triage

- name: confirmed
  color: "0e8a16"
  description: Bug confirmed and reproducible

- name: "wont-fix"
  color: "ffffff"
  description: This will not be fixed

- name: duplicate
  color: "cfd3d7"
  description: Duplicate of another issue

- name: "good first issue"
  color: "7057ff"
  description: Good for newcomers

- name: "help wanted"
  color: "008672"
  description: Extra attention needed

