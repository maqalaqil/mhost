version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci

  - package-ecosystem: npm
    directory: /npm-package
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - npm
