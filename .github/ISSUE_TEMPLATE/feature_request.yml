name: Feature Request
description: Suggest a new feature for mhost
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Tell us what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include CLI examples if possible.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Process management
        - Health checks
        - Notifications
        - Log engine
        - Metrics / Prometheus
        - Reverse proxy
        - Deploy engine
        - TUI dashboard
        - AI features
        - Cloud fleet
        - Chat bot
        - CLI
        - Config
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
