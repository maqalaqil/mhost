name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for mhost? We'd love to hear it!

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Process management
        - Health checks
        - Notifications
        - Log engine
        - Metrics / Prometheus
        - Reverse proxy
        - Deploy engine
        - TUI dashboard
        - AI features
        - Cloud fleet management
        - Chat bot (Telegram/Discord)
        - CLI / UX
        - Configuration
        - Performance
        - New platform / integration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use regularly
        - Blocking my workflow
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve? Why do you need it?
      placeholder: "I frequently need to ... but currently mhost doesn't support ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include CLI examples, config samples, or mockups.
      placeholder: |
        ```bash
        mhost <new-command> --flag value
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other tools or approaches you've looked at?

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, links, references, etc.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature
          required: false
