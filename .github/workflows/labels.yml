name: Sync Labels

on:
  push:
    branches: [main]
    paths: [".github/labels.yml"]

jobs:
  sync:
    name: Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          token: ${{ secrets.GITHUB_TOKEN }}
