name: Stale Issues

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: "This issue has been inactive for 30 days. It will be closed in 7 days if there's no further activity. Comment to keep it open."
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 7 days if there's no further activity."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "priority: critical,priority: high,help wanted,good first issue"
          exempt-pr-labels: "priority: critical,priority: high"
