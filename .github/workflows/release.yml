name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 1. Test ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # ─── 2. Determine version ───────────────────────────────────
  version:
    name: Version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: bump
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Count commits since last tag
          COMMIT_COUNT=$(git rev-list "${LATEST_TAG}..HEAD" --count 2>/dev/null || git rev-list HEAD --count)
          echo "Commits since $LATEST_TAG: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No new commits since last tag."
            exit 0
          fi

          # Parse version
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Check commit types
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          HAS_FEAT=$(echo "$COMMITS" | grep -ciE "^feat" || true)
          HAS_BREAKING=$(echo "$COMMITS" | grep -ciE "^.*!:" || true)

          # Determine bump type
          if [ "$HAS_BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "Will release: v${NEW_VERSION}"

  # ─── 3. Create tag ──────────────────────────────────────────
  tag:
    name: Create Tag
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 4. Build binaries ──────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [version, tag]
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            linux_musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            linux_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Set workspace version to ${VERSION}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools (x86_64 Linux)
        if: matrix.linux_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config cmake perl

      - name: Install cross (aarch64 Linux)
        if: matrix.linux_cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.linux_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross aarch64)
        if: matrix.linux_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x mhost mhostd
          tar czf ../../../mhost-${{ matrix.target }}.tar.gz mhost mhostd
          cd ../../..
          shasum -a 256 mhost-${{ matrix.target }}.tar.gz > mhost-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target\${{ matrix.target }}\release
          7z a ..\..\..\mhost-${{ matrix.target }}.zip mhost.exe mhostd.exe
          cd ..\..\..
          $hash = (Get-FileHash "mhost-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  mhost-${{ matrix.target }}.zip" | Out-File -Encoding ascii "mhost-${{ matrix.target }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: mhost-${{ matrix.target }}
          path: |
            mhost-${{ matrix.target }}.tar.gz
            mhost-${{ matrix.target }}.tar.gz.sha256
            mhost-${{ matrix.target }}.zip
            mhost-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  # ─── 5. GitHub Release ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt 2>/dev/null || echo "No checksums" > checksums.txt
          echo "=== Artifacts ==="
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "mhost ${{ needs.version.outputs.tag }}"
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 6. Publish npm ─────────────────────────────────────────
  publish-npm:
    name: npm
    needs: [version, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: |
          cd npm-package
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── 7. Publish crates.io ───────────────────────────────────
  publish-crates:
    name: crates.io
    needs: [version, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          CRATES=(
            mhost-core mhost-config mhost-ipc mhost-logs mhost-health
            mhost-notify mhost-metrics mhost-ai mhost-proxy mhost-deploy
            mhost-cloud mhost-bot mhost-tui mhost-daemon mhost-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            cargo publish -p "$crate" --allow-dirty 2>&1 || echo "  (skipped or already published)"
            echo "::endgroup::"
            sleep 20
          done

  # ─── 8. Homebrew tap ────────────────────────────────────────
  publish-homebrew:
    name: Homebrew
    needs: [version, build, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate formula
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          SHA_DARWIN_ARM=$(shasum -a 256 artifacts/mhost-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_X64=$(shasum -a 256 artifacts/mhost-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM=$(shasum -a 256 artifacts/mhost-aarch64-unknown-linux-musl.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(shasum -a 256 artifacts/mhost-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)

          cat > mhost.rb << RUBY
          class Mhost < Formula
            desc "AI-powered process manager written in Rust"
            homepage "https://github.com/maqalaqil/mhost"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/maqalaqil/mhost/releases/download/v${VERSION}/mhost-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              else
                url "https://github.com/maqalaqil/mhost/releases/download/v${VERSION}/mhost-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/maqalaqil/mhost/releases/download/v${VERSION}/mhost-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/maqalaqil/mhost/releases/download/v${VERSION}/mhost-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "mhost"
              bin.install "mhostd"
              generate_completions_from_executable(bin/"mhost", "completion")
            end

            test do
              assert_match "mhost #{version}", shell_output("#{bin}/mhost --version")
            end
          end
          RUBY

          # Remove leading whitespace (heredoc indentation)
          sed -i 's/^          //' mhost.rb

          echo "=== Generated Formula ==="
          cat mhost.rb

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: mhost.rb
          destination_repo: maqalaqil/homebrew-tap
          destination_folder: Formula
          user_email: mhost@users.noreply.github.com
          user_name: mhost-bot
          commit_message: "mhost ${{ needs.version.outputs.version }}"

  # ─── 9. GitHub Pages (deploy from gh-pages branch) ───────────
  deploy-website:
    name: Website
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          publish_branch: gh-pages

  # ─── 10. Docker ─────────────────────────────────────────────
  publish-docker:
    name: Docker
    needs: [version, build, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mhost-x86_64-unknown-linux-musl
          path: docker-build
      - run: cd docker-build && tar xzf mhost-x86_64-unknown-linux-musl.tar.gz

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/maqalaqil/mhost:${{ needs.version.outputs.version }}
            ghcr.io/maqalaqil/mhost:latest
