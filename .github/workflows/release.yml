name: Release

# ─── Trigger: every push to main auto-releases ────────────────
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 1. Test first ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # ─── 2. Auto-version + tag ──────────────────────────────────
  version:
    name: Version & Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version from commits
        id: bump
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION="${LATEST_TAG#v}"

          # Parse current version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          PATCH=${PATCH:-0}
          MINOR=${MINOR:-0}
          MAJOR=${MAJOR:-0}

          # Check commits since last tag for version bump type
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(feat|ci|docs|fix|chore|refactor|test|perf)"; then
            # Any meaningful commit = patch bump
            PATCH=$((PATCH + 1))
          else
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "No releasable commits found"
            exit 0
          fi

          # Check for breaking changes or feat = minor
          if echo "$COMMITS" | grep -qiE "^feat(\(|:)"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT
          echo "Releasing v${NEW_VERSION}"

      - name: Create tag
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # ─── 3. Build binaries for all platforms ────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: version
    if: needs.version.outputs.skipped != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x mhost mhostd
          tar czf ../../../mhost-${{ matrix.target }}.tar.gz mhost mhostd
          cd ../../..
          shasum -a 256 mhost-${{ matrix.target }}.tar.gz > mhost-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../mhost-${{ matrix.target }}.zip mhost.exe mhostd.exe
          cd ../../..
          Get-FileHash mhost-${{ matrix.target }}.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  mhost-${{ matrix.target }}.zip" } | Out-File -Encoding ascii mhost-${{ matrix.target }}.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: mhost-${{ matrix.target }}
          path: |
            mhost-${{ matrix.target }}.tar.gz
            mhost-${{ matrix.target }}.tar.gz.sha256
            mhost-${{ matrix.target }}.zip
            mhost-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  # ─── 4. GitHub Release ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create checksums
        run: cd artifacts && cat *.sha256 > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: mhost ${{ needs.version.outputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false

  # ─── 5. Publish npm ─────────────────────────────────────────
  publish-npm:
    name: Publish npm
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: |
          cd npm-package
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ─── 6. Publish crates.io ───────────────────────────────────
  publish-crates:
    name: Publish crates.io
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish all crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          for crate in mhost-core mhost-config mhost-ipc mhost-logs mhost-health \
                       mhost-notify mhost-metrics mhost-ai mhost-proxy mhost-deploy \
                       mhost-cloud mhost-bot mhost-tui mhost-daemon mhost-cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || true
            sleep 25
          done
        continue-on-error: true

  # ─── 7. Update Homebrew tap ─────────────────────────────────
  publish-homebrew:
    name: Update Homebrew
    needs: [version, build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Compute SHA256
        id: sha
        run: |
          echo "darwin_arm64=$(shasum -a 256 artifacts/mhost-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_x64=$(shasum -a 256 artifacts/mhost-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(shasum -a 256 artifacts/mhost-aarch64-unknown-linux-musl.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(shasum -a 256 artifacts/mhost-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate formula
        run: |
          VERSION=${{ needs.version.outputs.version }}
          cat > mhost.rb << EOF
          class Mhost < Formula
            desc "AI-powered process manager written in Rust"
            homepage "https://github.com/maheralaqil/mhost"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/maheralaqil/mhost/releases/download/v${VERSION}/mhost-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "https://github.com/maheralaqil/mhost/releases/download/v${VERSION}/mhost-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/maheralaqil/mhost/releases/download/v${VERSION}/mhost-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "https://github.com/maheralaqil/mhost/releases/download/v${VERSION}/mhost-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install "mhost"
              bin.install "mhostd"
              generate_completions_from_executable(bin/"mhost", "completion")
            end

            test do
              assert_match "mhost #{version}", shell_output("#{bin}/mhost --version")
            end
          end
          EOF

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: mhost.rb
          destination_repo: maheralaqil/homebrew-tap
          destination_folder: Formula
          user_email: mhost@users.noreply.github.com
          user_name: mhost-bot
          commit_message: "mhost ${{ needs.version.outputs.version }}"
        continue-on-error: true

  # ─── 8. Deploy website ──────────────────────────────────────
  deploy-website:
    name: Deploy Website
    needs: [version, release]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4

  # ─── 9. Docker image ────────────────────────────────────────
  publish-docker:
    name: Docker Image
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mhost-x86_64-unknown-linux-musl
          path: docker-build
      - run: cd docker-build && tar xzf mhost-x86_64-unknown-linux-musl.tar.gz

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/maheralaqil/mhost:${{ needs.version.outputs.version }}
            ghcr.io/maheralaqil/mhost:latest
